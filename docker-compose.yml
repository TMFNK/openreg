# docker-compose.yml
# All secrets are read from a .env file (copy .env.example → .env).
# Never commit .env to version control.

services:
  # ── Application (ETL + Dashboard) ──────────────────────────────────────────
  app:
    build: .
    container_name: openreg_app
    env_file: .env
    environment:
      DATABASE_TYPE: postgresql
      POSTGRES_HOST: postgresql
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-openreg}
      POSTGRES_USER: ${POSTGRES_USER:-openreg_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./reports:/app/reports
      - ./logs:/app/logs
      - ./data:/app/data
    ports:
      - "8501:8501" # Streamlit dashboard
    networks:
      - openreg_network
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    command:
      [
        "streamlit",
        "run",
        "dashboard/app.py",
        "--server.port=8501",
        "--server.address=0.0.0.0",
      ]

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgresql:
    image: postgres:15-alpine
    container_name: openreg_postgresql
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openreg}
      POSTGRES_USER: ${POSTGRES_USER:-openreg_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
      - ./sql/postgresql_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    networks:
      - openreg_network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-openreg_user} -d ${POSTGRES_DB:-openreg}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: openreg_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - openreg_network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # ── pgAdmin (Development only – disable in production) ─────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: openreg_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@openreg.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - openreg_network
    depends_on:
      postgresql:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - dev # Start only with: docker compose --profile dev up

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: openreg_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - openreg_network
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
    restart: unless-stopped
    profiles:
      - monitoring

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: openreg_grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - openreg_network
    depends_on:
      - prometheus
    restart: unless-stopped
    profiles:
      - monitoring

volumes:
  postgresql_data:
  redis_data:
  pgadmin_data:
  prometheus_data:
  grafana_data:

networks:
  openreg_network:
    driver: bridge

# =============================================
# USAGE
# =============================================
#
# 1. cp .env.example .env  &&  edit .env
#
# Development (SQLite, no Docker):
#   pip install -r requirements.txt
#   python run_pipeline.py
#   streamlit run dashboard/app.py
#
# Development (PostgreSQL + pgAdmin):
#   docker compose --profile dev up postgresql pgadmin redis
#
# Production (all services):
#   docker compose up -d
#
# With monitoring:
#   docker compose --profile monitoring up -d
#
# Endpoints (after docker compose up):
#   Dashboard   : http://localhost:8501
#   pgAdmin     : http://localhost:5050  (dev profile only)
#   Grafana     : http://localhost:3000  (monitoring profile)
#   Prometheus  : http://localhost:9090  (monitoring profile)
