version: "3.8"

services:
  # PostgreSQL Database (Production-Ready)
  postgresql:
    image: postgres:15-alpine
    container_name: openreg_postgresql
    environment:
      POSTGRES_DB: openreg
      POSTGRES_USER: openreg_user
      POSTGRES_PASSWORD: secure_password_2024 # 🔐 CHANGE IN PRODUCTION
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
      - ./sql/postgresql_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./scripts/init_db.sh:/docker-entrypoint-initdb.d/02_init.sh
    ports:
      - "5432:5432"
    networks:
      - openreg_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openreg_user -d openreg"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (Optional - for performance)
  redis:
    image: redis:7-alpine
    container_name: openreg_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - openreg_network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # pgAdmin (Database Administration - Development Only)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: openreg_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@openreg.com
      PGADMIN_DEFAULT_PASSWORD: admin123 # 🔐 CHANGE IN PRODUCTION
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - openreg_network
    depends_on:
      postgresql:
        condition: service_healthy
    restart: unless-stopped

  # Prometheus (Monitoring - Production)
  prometheus:
    image: prom/prometheus:latest
    container_name: openreg_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - openreg_network
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
    restart: unless-stopped

  # Grafana (Dashboards - Production)
  grafana:
    image: grafana/grafana:latest
    container_name: openreg_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123 # 🔐 CHANGE IN PRODUCTION
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    networks:
      - openreg_network
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgresql_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  openreg_network:
    driver: bridge
# =============================================
# USAGE INSTRUCTIONS
# =============================================
#
# Development Setup:
# 1. docker-compose up postgresql pgadmin
# 2. Access pgAdmin at http://localhost:5050
#    - Email: admin@openreg.com
#    - Password: admin123
#
# Production Setup:
# 1. Update passwords in environment variables
# 2. docker-compose up -d
# 3. Access services:
#    - PostgreSQL: localhost:5432
#    - Redis: localhost:6379
#    - Grafana: http://localhost:3000
#    - Prometheus: http://localhost:9090
#
# Monitoring:
# - Grafana dashboards will be pre-configured
# - Prometheus will collect metrics from the application
# - Set up alerts in Grafana for critical events
#
# Backup Strategy:
# - PostgreSQL data is persisted in postgresql_data volume
# - Implement automated backups using pg_dump or similar tools
# - Consider using cloud storage for backups
#
# Scaling:
# - Add read replicas by creating additional postgresql services
# - Use Redis Cluster for horizontal scaling
# - Implement load balancing for web services
