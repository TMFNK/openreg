name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 mypy pytest-cov

      - name: Lint with flake8
        run: |
          flake8 . --max-line-length=110 --exclude=.venv,build

      - name: Type check with mypy
        run: |
          mypy . --ignore-missing-imports || true

      - name: Run tests with pytest
        run: |
          pytest tests/ --tb=short --cov=. --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t openreg:test .

      - name: Verify Python imports
        run: |
          docker run --rm openreg:test python -c "import pandas; import numpy; import yaml; import streamlit; import sqlalchemy; import structlog; print('All imports successful')"
